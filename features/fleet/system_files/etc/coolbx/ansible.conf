# Coolbx OS — ansible-pull configuratie (Fase 6).
# Zet ANSIBLE_PULL_URL op de echte vlootconfig-repo om periodieke config-pull te ACTIVEREN.
# Zolang de waarde "PLACEHOLDER" bevat, doet coolbx-ansible-pull niets (no-op) — veilig default.
# De repo bevat een `local.yml` die op coolbx_group (leerlingen/leerkrachten/administratie) vertakt.
# STRAK GESCOPED: enkel runtime/per-rol-config (netwerk/printer/ring/toggles), NOOIT software/kernconfig.
ANSIBLE_PULL_URL="PLACEHOLDER — bv. https://github.com/edugolo/coolbx-ansible.git"
ANSIBLE_PULL_PLAYBOOK="local.yml"
