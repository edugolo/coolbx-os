# Coolbx kiosk — vergrendelde sway-sessie (ADR-0006).
# GEEN bindsym/bindcode -> geen sneltoetsen, geen workspace-switch, geen exec, geen mode.
# (VT-switch-blokkade zit op logind/kernel-niveau, niet hier — zie S3/Fase 4.)

default_border none
default_floating_border none
focus_follows_mouse no
# Geen ledige-workspace-naam-bar; we gebruiken waybar.
font pango:DejaVu Sans 11

# Externe monitors: spiegel het kioskscherm (geen blinde tweede workspace).
# (placeholder — multi-output mirror wordt in Fase 4 hardening uitgewerkt)

# Minimale systeem-UI: waybar als layer-shell statusbalk (exec, niet via sway's bar-block).
exec /usr/bin/waybar -c /usr/share/coolbx/kiosk/waybar/config.jsonc -s /usr/share/coolbx/kiosk/waybar/style.css

# De kiosk-browser; herstart bij crash via de wrapper (met limiet).
exec /usr/share/coolbx/kiosk/chromium-kiosk.sh