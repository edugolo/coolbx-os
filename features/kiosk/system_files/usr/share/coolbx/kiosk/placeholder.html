<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Coolbx Focus — Toetsmodus</title>
  <style>
    :root {
      --bg: #141210; --surface: #2b2620; --paper: #faf8f3;
      --sub: #968e82; --amber: #e8902a;
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-family: "Inter", "DejaVu Sans", sans-serif;
      background: var(--bg); color: var(--paper);
      -webkit-font-smoothing: antialiased;
    }
    /* viewfinder met amber-hoeken (Focus-motief, variant A) */
    .viewfinder { position: relative; width: 168px; height: 168px; margin-bottom: 52px; }
    .viewfinder span {
      position: absolute; width: 40px; height: 40px;
      border: 5px solid var(--amber); border-radius: 4px;
    }
    .viewfinder .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 14px; }
    .viewfinder .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 14px; }
    .viewfinder .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 14px; }
    .viewfinder .br { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 14px; }
    .viewfinder .dot {
      position: absolute; top: 50%; left: 50%; width: 22px; height: 22px;
      margin: -11px 0 0 -11px; border-radius: 50%; background: var(--amber);
      animation: pulse 1.8s ease-in-out infinite;
    }
    .mark { font-size: 52px; font-weight: 900; letter-spacing: -0.5px; }
    .mark .accent { color: var(--amber); font-weight: 800; }
    .sub { margin-top: 18px; font-size: 22px; color: var(--sub); }
    .hint { margin-top: 64px; font-size: 15px; color: #6b6256; letter-spacing: 0.3px; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="viewfinder">
    <span class="tl"></span><span class="tr"></span>
    <span class="bl"></span><span class="br"></span>
    <span class="dot"></span>
  </div>
  <div class="mark">coolbx <span class="accent">focus</span></div>
  <div class="sub">Toetsmodus — wachten op je leerkracht…</div>
  <div class="hint">verbinden met focus-api.edugolo.be</div>
</body>
</html>
