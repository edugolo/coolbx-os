<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Coolbx Toetsmodus</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-family: "DejaVu Sans", "Noto Sans", sans-serif;
      background: #faf8f3; color: #2b2620;
    }
    .mark { font-size: 44px; font-weight: 800; letter-spacing: 0.5px; }
    .mark .accent { color: #e8902a; }
    .sub { margin-top: 16px; font-size: 21px; color: #6b6256; }
    .dot { margin-top: 44px; width: 11px; height: 11px; border-radius: 50%;
           background: #e8902a; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="mark">coolbx <span class="accent">·</span> toetsmodus</div>
  <div class="sub">Wachten op je leerkracht…</div>
  <div class="dot"></div>
</body>
</html>
