# Coolbx OS — build, push & sign the bootc container image (Fase 5, ADR-0021/0022 + ublue-os patterns).
# Single image (no flavor matrix). Publishes a PRODUCTION image (ENABLE_FIRSTBOOT_USER=0: no testuser,
# DevTools/file:// hardening present). PRs build-only; main/cron/dispatch push + cosign-sign by digest.
name: build

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/README.md', 'docs/**']
  push:
    branches: [main]
    paths-ignore: ['**/README.md', 'docs/**']
  schedule:
    - cron: '15 4 * * *'   # daily 04:15 UTC → pull in fedora-bootc CVE-fixes automatically
  workflow_dispatch:

env:
  IMAGE_NAME: coolbx-os
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FEATURES: "kiosk branding hardware fleet attest managed"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Lowercase registry
        run: echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"

      # Tags: stable channel + dated + (on PR) a sha tag. Canary :testing is promoted manually.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stable,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=stable.{{date 'YYYYMMDD'}},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr

      # Bouw in ROOT-storage met een localhost-tag. CRUCIAAL voor rechunk: die mount de image via
      # `sudo podman create` (root-storage). Een ROOTLESS build (redhat-actions/buildah-build) is daar
      # ONZICHTBAAR → rechunk pullt dan stil de OUDE remote :stable (podman pull-policy 'missing') en
      # rechunkt die — de bron van onze "content-drop". Een `localhost/`-naam kan NOOIT van remote
      # gepulld worden → gegarandeerd de verse build of een luide fout. (Bron: rechunk README "build
      # using root" + ublue-os/bazzite build.yml.)
      - name: Build image (PRODUCTION — ENABLE_FIRSTBOOT_USER=0)
        run: |
          set -euo pipefail
          sudo -E buildah build \
            --tag "localhost/${IMAGE_NAME}:stable" \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "ENABLE_FIRSTBOOT_USER=0" \
            --build-arg "FEATURES_CACHEBUST=${{ github.sha }}" \
            --build-arg "SHA_HEAD_SHORT=${{ github.sha }}" \
            --format oci \
            -f ./Containerfile .

      # Login als ROOT (de push draait via sudo podman). NB: rootless `podman login` hier mixen met de
      # sudo-podman-operaties breekt de rootless runtime (/run/user/$UID/containers niet schrijfbaar).
      # Cosign-signing (nu inactief) heeft later eigen auth nodig → aanpakken bij signing-activatie.
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ostree-rechunk → pakket-gegroepeerde chunks → kleinere bootc-upgrade-deltas. ref = de LOKALE
      # localhost-build (root-storage). prev-ref = de remote :stable, enkel voor versie/laag-continuïteit
      # (delta-updates); beïnvloedt geen content. Ontbreekt prev-ref → overgeslagen (geen prev-ref-fail).
      - name: Rechunk
        id: rechunk
        if: github.event_name != 'pull_request'
        uses: hhd-dev/rechunk@5fbe1d3a639615d2548d83bc888360de6267b1a2 # v1.2.4
        with:
          ref: localhost/${{ env.IMAGE_NAME }}:stable
          prev-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:stable
          version: stable
          labels: ${{ steps.meta.outputs.labels }}

      # CONTROLE-STAP + push. Mount de rechunk-output (root) en eis dat het OS-kern-anker (het
      # versie-stempel /usr/lib/coolbx-build-id) GELIJK is aan deze build-SHA — bewijst dat de verse
      # build gerechunkt is, niet per ongeluk een oude image (de storage-mismatch-bug). Feature-
      # ONAFHANKELIJK: geen toetsmodus-bestanden meer (die bestaan niet in een kale OS zonder kiosk).
      # Daarnaast een firmware-sanity (ook OS-kern). Push pas na een geslaagde controle.
      - name: Verify content + push
        id: push
        if: github.event_name != 'pull_request'
        env:
          REF: ${{ steps.rechunk.outputs.ref }}
          TAGS: ${{ steps.meta.outputs.tags }}
          EXPECT_BUILD_ID: ${{ github.sha }}
        run: |
          set -euo pipefail
          img="$(sudo podman pull -q "$REF")"
          cref="$(sudo podman create "$img" true)"
          mnt="$(sudo podman mount "$cref")"
          fail=0
          got="$(sudo cat "$mnt/usr/lib/coolbx-build-id" 2>/dev/null || true)"
          [ "$got" = "$EXPECT_BUILD_ID" ] || { echo "::error::versie-stempel mismatch: '$got' != '$EXPECT_BUILD_ID' (oude image gerechunkt?)"; fail=1; }
          sudo test -e "$mnt/usr/lib/firmware/iwlwifi-cc-a0-77.ucode.xz" || { echo "::error::iwlwifi-firmware ontbreekt"; fail=1; }
          sudo podman umount "$cref" >/dev/null; sudo podman rm "$cref" >/dev/null
          [ "$fail" = 0 ] || { echo "::error::Rechunk-output is niet de verse build — niets gepusht."; exit 1; }
          echo "Controle OK: verse build (${EXPECT_BUILD_ID}) correct gerechunkt."
          digest=""
          for tag in $TAGS; do
            sudo podman tag "$img" "$tag"
            sudo podman push --digestfile=/tmp/digest "$tag"
            digest="$(cat /tmp/digest)"
          done
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed @ ${digest}"

      # cosign SIGN-BY-DIGEST (not by-tag). Activates automatically once the SIGNING_SECRET
      # repo secret (wachtwoordloze cosign private key) exists; until then the image is pushed
      # UNSIGNED (scaffold veilig niet-actief — zie docs/SIGNING.md). cosign.pub is committed in
      # the repo + baked into the image at /etc/pki/containers/coolbx.pub (on-device verification).
      - name: Detect signing key
        id: signing
        if: github.event_name != 'pull_request'
        env:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
        run: |
          if [ -n "$SIGNING_SECRET" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SIGNING_SECRET niet ingesteld — image UNSIGNED gepusht (zie docs/SIGNING.md)"
          fi

      - name: Install cosign
        if: steps.signing.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign by digest
        if: steps.signing.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
