# Coolbx OS — build, push & sign the bootc container image (Fase 5, ADR-0021/0022 + ublue-os patterns).
# Single image (no flavor matrix). Publishes a PRODUCTION image (ENABLE_FIRSTBOOT_USER=0: no testuser,
# DevTools/file:// hardening present). PRs build-only; main/cron/dispatch push + cosign-sign by digest.
name: build

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/README.md', 'docs/**']
  push:
    branches: [main]
    paths-ignore: ['**/README.md', 'docs/**']
  schedule:
    - cron: '15 4 * * *'   # daily 04:15 UTC → pull in fedora-bootc CVE-fixes automatically
  workflow_dispatch:

env:
  IMAGE_NAME: coolbx-os
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FEATURES: "kiosk branding fleet attest managed"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5

      - name: Lowercase registry
        run: echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"

      # Tags: stable channel + dated + (on PR) a sha tag. Canary :testing is promoted manually.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stable,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=stable.{{date 'YYYYMMDD'}},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr

      - name: Build image (PRODUCTION — ENABLE_FIRSTBOOT_USER=0)
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          containerfiles: ./Containerfile
          # Dedicated build-args input: each KEY=VALUE is passed as one argv element, so the
          # space-separated FEATURES value stays a single --build-arg (extra-args woord-split het wél).
          build-args: |
            FEATURES=${{ env.FEATURES }}
            ENABLE_FIRSTBOOT_USER=0
            FEATURES_CACHEBUST=${{ github.sha }}
          # bootc container lint runs as the final Containerfile layer.
          oci: true

      # NOTE: ostree-rechunk (package-grouped layers → kleinere `bootc upgrade`-deltas) is bewust
      # nog NIET bedraad. Het vergt: ref = lokaal-gekwalificeerde tag, de rechunker-tool-image
      # (ghcr.io/hhd-dev/rechunk, niet een base-image), én het pushen van de rechunk-OCI-output
      # (skopeo copy) i.p.v. de originele image. Volgt als aparte, geteste stap zodra :stable
      # als diff-baseline bestaat. Zie docs/SIGNING.md / ROADMAP Fase 5.
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push by digest
        id: push
        if: github.event_name != 'pull_request'
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      # cosign SIGN-BY-DIGEST (not by-tag). Activates automatically once the SIGNING_SECRET
      # repo secret (wachtwoordloze cosign private key) exists; until then the image is pushed
      # UNSIGNED (scaffold veilig niet-actief — zie docs/SIGNING.md). cosign.pub is committed in
      # the repo + baked into the image at /etc/pki/containers/coolbx.pub (on-device verification).
      - name: Detect signing key
        id: signing
        if: github.event_name != 'pull_request'
        env:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
        run: |
          if [ -n "$SIGNING_SECRET" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::SIGNING_SECRET niet ingesteld — image UNSIGNED gepusht (zie docs/SIGNING.md)"
          fi

      - name: Install cosign
        if: steps.signing.outputs.enabled == 'true'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign by digest
        if: steps.signing.outputs.enabled == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE_REGISTRY}/${IMAGE_NAME}@${DIGEST}"
